package:
  name: spago
  publish:
    version: 1.0.3
    license: BSD-3-Clause
    location:
      githubOwner: purescript
      githubRepo: spago
  build:
    strict: true
    censorProjectWarnings:
      - WildcardInferredType
      - ImplicitQualifiedImportReExport
  dependencies:
    - aff
    - aff-promise
    - affjax
    - affjax-node
    - ansi
    - arrays
    - avar
    - codec
    - codec-json
    - console
    - control
    - datetime
    - docs-search-common
    - docs-search-index
    - dodo-printer
    - effect
    - either
    - enums
    - exceptions
    - fetch
    - filterable
    - foldable-traversable
    - foreign-object
    - formatters
    - functions
    - graphs
    - http-methods
    - integers
    - json
    - language-cst-parser
    - lists
    - maybe
    - newtype
    - node-buffer
    - node-child-process
    - node-execa
    - node-fs
    - node-path
    - node-process
    - now
    - nullable
    - ordered-collections
    - parallel
    - partial
    - posix-types
    - prelude
    - profunctor
    - record
    - refs
    - registry-lib
    - routing-duplex
    - spago-core
    - strings
    - strings-extra
    - stringutils
    - transformers
    - tuples
    - unfoldable
    - unicode
    - unsafe-coerce
  test:
    main: Test.Spago
    censorTestWarnings:
      - ImplicitQualifiedImportReExport
      - ImplicitQualifiedImport
    dependencies:
      - exceptions
      - quickcheck
      - spec
      - spec-node
workspace:
  packageSet:
    registry: 75.0.0
  extraPackages:
    registry-lib:
      git: https://github.com/purescript/registry-dev.git
      ref: 3e8af27822b9d1ac8bfb158cdad08bcf6e6ec8be
      subdir: lib
    html-parser-halogen:
      dependencies:
        - halogen
        - string-parsers
      git: https://github.com/rnons/purescript-html-parser-halogen.git
      ref: 035a51d02ba9f8b70c3ffd9fe31a3f5bed19941c
    language-purescript:
      ref: db4377dea03ba9c5273a93a8368a53f1d87882c1
      git: https://github.com/JordanMartinez/purescript-language-purescript.git
      dependencies:
        - argonaut-core
        - arrays
        - bifunctors
        - control
        - datetime
        - either
        - enums
        - foldable-traversable
        - foreign-object
        - formatters
        - functions
        - integers
        - json-codecs
        - lists
        - maybe
        - newtype
        - nullable
        - ordered-collections
        - partial
        - prelude
        - safe-coerce
        - st
        - strings
        - tuples
        - unicode
        - versions
    markdown-it:
      dependencies:
        - effect
        - options
        - prelude
      git: https://github.com/nonbili/purescript-markdown-it.git
      ref: f6e8ee91298f2fc13c4277e75a19e0538de5f7a2
    markdown-it-halogen:
      dependencies:
        - html-parser-halogen
        - markdown-it
      git: https://github.com/nonbili/purescript-markdown-it-halogen.git
      ref: 08c9625015bf04214be14e45230e8ce12f3fa2bf
    memoize:
      dependencies:
        - either
        - integers
        - lazy
        - lists
        - maybe
        - prelude
        - strings
        - tuples
      git: https://github.com/paf31/purescript-memoize.git
      ref: 9960694e82adc212fd89f8ed8778cf55fcb72aeb
    search-trie:
      dependencies:
        - arrays
        - bifunctors
        - foldable-traversable
        - lists
        - ordered-collections
        - prelude
      git: https://github.com/klntsky/purescript-search-trie.git
      ref: e7f7f22486a1dba22171ec885dbc2149dc815119
    json-codecs: 4.0.0
    spec:
      git: https://github.com/purescript-spec/purescript-spec.git
      ref: 2f8c7fd6ee04041d947f4629248695ac667257e1

